<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trivia Game</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5">
                            <h1 class="display-6 fw-bold mb-3">Welcome to the Trivia Game!</h1>
                            <p class="text-muted mb-4">Pick a category and start testing your knowledge.</p>
                            <form th:action="${triviaBasePath + '/questions'}" method="post" class="d-grid gap-3">
                                <label for="category" class="form-label fw-semibold">Choose a category</label>
                                <select id="category" name="category" class="form-select form-select-lg">
                                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-lg">Start Game</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
