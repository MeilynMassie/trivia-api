<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trivia Game</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script th:src="@{/js/main.js}"></script>
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h1 class="display-6 fw-bold mb-4">Trivia Challenge</h1>
                    <div th:each="question : ${questions}" class="card shadow-sm border-0 mb-4">
                        <div class="card-body p-4">
                            <h5 class="card-title fw-semibold mb-3" th:text="${question.question}"></h5>
                            <div class="d-grid gap-2">
                                <button type="button"
                                        th:each="choice : ${question.choices}"
                                        class="btn btn-outline-primary text-start"
                                        th:onclick="checkAnswer([[${choice}]], [[${question.answer}]])"
                                        th:text="${choice}">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
